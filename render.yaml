# Blueprint Render — https://render.com/docs/blueprint-spec
# Conecte o repo no Render: New > Blueprint > selecione FITELLAv2
# Defina DATABASE_URL (Neon) e JWT_SECRET no painel antes do primeiro deploy.

services:
  - type: web
    name: fitela-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: yarn install --frozen-lockfile && yarn build
    startCommand: yarn start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SYNC
        value: "true"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: fitela-web
          property: host

  - type: web
    name: fitela-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: fitela-api
          property: host
