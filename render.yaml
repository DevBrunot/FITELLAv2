# Blueprint Render — https://render.com/docs/blueprint-spec
# No painel, defina DATABASE_URL (Neon) quando solicitado.

services:
  - type: web
    name: fitela-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: YARN_PRODUCTION=false yarn install --frozen-lockfile && yarn build
    startCommand: yarn start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SYNC
        value: "true"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: fitela-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: fitela-web
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: fitela-api
          envVarKey: RENDER_EXTERNAL_URL
