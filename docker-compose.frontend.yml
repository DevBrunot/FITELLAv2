services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      network: host
    container_name: fitela-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
